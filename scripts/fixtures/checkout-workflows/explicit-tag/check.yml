name: Check
on: [push]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: !!str actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: !!bool false
        env:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      - run: npm ci
      - run: make check
workflow_dispatch:
